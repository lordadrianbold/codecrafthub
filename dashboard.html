<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #8B5CF6;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.1rem;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #374151;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, textarea, select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
        }

        .btn-primary:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }

        .btn-edit {
            background: #F59E0B;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-edit:hover {
            background: #d97706;
        }

        .btn-delete {
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .btn-cancel {
            background: #6b7280;
            color: white;
        }

        .btn-cancel:hover {
            background: #4b5563;
        }

        .courses-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .courses-section h2 {
            color: #374151;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .course-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }

        .course-card:hover {
            border-color: #8B5CF6;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
        }

        .course-header {
            margin-bottom: 15px;
        }

        .course-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .course-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-not-started {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .course-description {
            color: #6b7280;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .course-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .course-actions {
            display: flex;
            gap: 10px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f4f6;
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .loading-overlay .loading-spinner {
            width: 40px;
            height: 40px;
            border-width: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #374151;
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #6b7280;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .modal-close:hover {
            color: #374151;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CodeCraftHub</h1>
            <p class="subtitle">Your Learning Management Platform</p>
        </header>

        <div id="messageContainer"></div>

        <section class="form-section">
            <h2>Add New Course</h2>
            <form id="addCourseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" required placeholder="e.g., JavaScript Fundamentals">
                    </div>
                    <div class="form-group">
                        <label for="courseStatus">Status *</label>
                        <select id="courseStatus" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="courseTargetDate">Target Date *</label>
                        <input type="date" id="courseTargetDate" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="courseDescription">Description *</label>
                        <textarea id="courseDescription" required placeholder="Describe what you'll learn in this course..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">
                    <span id="submitBtnText">Add Course</span>
                </button>
            </form>
        </section>

        <section class="courses-section">
            <h2>My Courses</h2>
            <div id="coursesContainer">
                <div class="loading-overlay">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 20px;">Loading courses...</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Edit Course Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Course</h3>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editCourseForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input type="text" id="editCourseName" required>
                    </div>
                    <div class="form-group">
                        <label for="editCourseStatus">Status *</label>
                        <select id="editCourseStatus" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editCourseTargetDate">Target Date *</label>
                        <input type="date" id="editCourseTargetDate" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="editCourseDescription">Description *</label>
                        <textarea id="editCourseDescription" required></textarea>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="editSubmitBtn">
                        <span id="editSubmitBtnText">Save Changes</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api/courses';

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            loadCourses();
            setupEventListeners();
        });

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('addCourseForm').addEventListener('submit', handleAddCourse);
            document.getElementById('editCourseForm').addEventListener('submit', handleEditCourse);
        }

        // Show message
        function showMessage(message, type = 'success') {
            const messageContainer = document.getElementById('messageContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message message-${type}`;
            messageEl.textContent = message;
            messageContainer.appendChild(messageEl);

            setTimeout(() => {
                messageEl.remove();
            }, 5000);
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        // Get status class
        function getStatusClass(status) {
            const statusMap = {
                'Not Started': 'status-not-started',
                'In Progress': 'status-in-progress',
                'Completed': 'status-completed'
            };
            return statusMap[status] || 'status-not-started';
        }

        // Load courses
        async function loadCourses() {
            const container = document.getElementById('coursesContainer');

            try {
                const response = await fetch(API_BASE_URL);

                if (!response.ok) {
                    throw new Error(`Failed to fetch courses: ${response.statusText}`);
                }

                const courses = await response.json();

                if (courses.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <h3>No courses yet</h3>
                            <p>Start by adding your first course above!</p>
                        </div>
                    `;
                    return;
                }

                const coursesHTML = courses.map(course => `
                    <div class="course-card">
                        <div class="course-header">
                            <div class="course-name">${escapeHtml(course.name)}</div>
                            <span class="course-status ${getStatusClass(course.status)}">${escapeHtml(course.status)}</span>
                        </div>
                        <div class="course-description">${escapeHtml(course.description)}</div>
                        <div class="course-meta">
                            <div>📅 Target Date: ${formatDate(course.target_date)}</div>
                            <div>🕐 Created: ${formatDate(course.created_at)}</div>
                        </div>
                        <div class="course-actions">
                            <button class="btn-edit" onclick="openEditModal('${course.id}')">Edit</button>
                            <button class="btn-delete" onclick="deleteCourse('${course.id}')">Remove</button>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `<div class="courses-grid">${coursesHTML}</div>`;
            } catch (error) {
                console.error('Error loading courses:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Failed to load courses</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">Make sure the backend server is running at ${API_BASE_URL}</p>
                    </div>
                `;
            }
        }

        // Handle add course
        async function handleAddCourse(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');

            const courseData = {
                name: document.getElementById('courseName').value,
                description: document.getElementById('courseDescription').value,
                target_date: document.getElementById('courseTargetDate').value,
                status: document.getElementById('courseStatus').value
            };

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtnText.innerHTML = '<span class="loading-spinner"></span> Adding...';

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Failed to add course: ${response.statusText}`);
                }

                showMessage('Course added successfully!', 'success');
                document.getElementById('addCourseForm').reset();
                await loadCourses();
            } catch (error) {
                console.error('Error adding course:', error);
                showMessage(error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtnText.textContent = 'Add Course';
            }
        }

        // Open edit modal
        async function openEditModal(courseId) {
            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`);

                if (!response.ok) {
                    throw new Error(`Failed to fetch course: ${response.statusText}`);
                }

                const course = await response.json();

                document.getElementById('editCourseId').value = course.id;
                document.getElementById('editCourseName').value = course.name;
                document.getElementById('editCourseDescription').value = course.description;
                document.getElementById('editCourseTargetDate').value = course.target_date;
                document.getElementById('editCourseStatus').value = course.status;

                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                console.error('Error loading course:', error);
                showMessage(error.message, 'error');
            }
        }

        // Close edit modal
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editCourseForm').reset();
        }

        // Handle edit course
        async function handleEditCourse(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('editSubmitBtn');
            const submitBtnText = document.getElementById('editSubmitBtnText');

            const courseId = document.getElementById('editCourseId').value;
            const courseData = {
                name: document.getElementById('editCourseName').value,
                description: document.getElementById('editCourseDescription').value,
                target_date: document.getElementById('editCourseTargetDate').value,
                status: document.getElementById('editCourseStatus').value
            };

            submitBtn.disabled = true;
            submitBtnText.innerHTML = '<span class="loading-spinner"></span> Saving...';

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Failed to update course: ${response.statusText}`);
                }

                showMessage('Course updated successfully!', 'success');
                closeEditModal();
                await loadCourses();
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage(error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtnText.textContent = 'Save Changes';
            }
        }

        // Delete course
        async function deleteCourse(courseId) {
            if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Failed to delete course: ${response.statusText}`);
                }

                showMessage('Course deleted successfully!', 'success');
                await loadCourses();
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage(error.message, 'error');
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
